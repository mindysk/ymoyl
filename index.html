<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="YMOYL">
<meta name="theme-color" content="#1B5E3B">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Your Money or Your Life</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Overpass+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f5f8;--card:#fff;--border:#e8eaed;--text:#1a1a2e;--muted:#888;--light:#f0f2f5;--green:#1B5E3B;--green2:#2E7D52;--red:#E8453C;--orange:#F57C00;--purple:#541346;--purple2:#7E57C2;--blue:#2196F3;--teal:#26A69A}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{overscroll-behavior:none;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text)}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
.mono{font-family:'Overpass Mono',monospace}
.fade{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 0 0 1px rgba(0,0,0,.04)}
.lbl{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.inp{padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:#f8f9fb;color:var(--text);font-family:'Overpass Mono',monospace;font-size:14px;outline:none;width:100%}
.sel{padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:#f8f9fb;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;outline:none;width:100%}
.btn{padding:12px 20px;border-radius:12px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;transition:all .15s}
.btn-p{background:var(--green);color:#fff}
.btn-s{background:var(--light);color:#333}
.btn-d{background:#fff;color:var(--red);border:1px solid var(--red)}
.pill{padding:7px 16px;border-radius:20px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:600;font-size:13px;transition:all .2s;white-space:nowrap;background:var(--light);color:#555}
.pill.on{font-weight:700;color:#fff;background:var(--green)}
.toast-pop{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 24px;border-radius:99px;font-size:13px;font-weight:700;z-index:200;animation:fadeIn .25s ease}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #eee;display:flex;justify-content:space-around;padding:4px 0 env(safe-area-inset-bottom,8px);z-index:40}
.nb{display:flex;flex-direction:column;align-items:center;gap:1px;background:none;border:none;cursor:pointer;padding:6px 2px;min-width:0;flex:1}
.nb .ni{font-size:20px;transition:transform .15s}
.nb .nl{font-size:9px;font-weight:700;color:var(--muted)}
.nb.on .ni{transform:scale(1.12)}
.nb.on .nl{color:var(--green)}
.scrollx{display:flex;overflow-x:auto;gap:10px;padding-bottom:4px;scrollbar-width:none}
.scrollx::-webkit-scrollbar{display:none}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(2px);z-index:99}
.sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;max-height:88vh;overflow:auto;padding:8px 0 24px;z-index:100;animation:slideUp .25s ease}
.sheet-h{width:36px;height:4px;border-radius:2px;background:#ddd;margin:0 auto 12px}
.sheet-t{padding:0 20px 14px;font-size:17px;font-weight:800}
.sheet-b{padding:0 20px}
.pbar{width:100%;border-radius:99px;overflow:hidden}
.pbar-f{height:100%;border-radius:99px;transition:width .5s ease}
.fab{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);width:52px;height:52px;border-radius:50%;background:var(--green);color:#fff;border:none;cursor:pointer;font-size:26px;font-weight:300;z-index:50;box-shadow:0 4px 14px rgba(27,94,59,.4);display:flex;align-items:center;justify-content:center}
.debt-hero{background:linear-gradient(135deg,#541346,#7E3B6E);border-radius:16px;padding:24px;color:#fff;margin-bottom:12px}
.stat-box{flex:1;border-radius:12px;padding:14px 10px;text-align:center}
.acc-card{min-width:240px;border-radius:16px;padding:18px;color:#fff;cursor:pointer;transition:transform .15s;flex-shrink:0}
.acc-card:active{transform:scale(.97)}
#app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px;position:relative}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const e=React.createElement,{useState:us,useEffect:ue,useMemo:um,useCallback:uc}=React;

/* ═══ CONSTANTS ═══ */
const CUR={SGD:"S$",THB:"฿",USD:"$"},FX={SGD:1,THB:0.039,USD:1.34};
const MO=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const FL=["","Regret","Meh","Fine","Happy","Joyful"];
const FC=["","#E8453C","#E8883C","#E8C93C","#4CAF50","#7E57C2"];
const AT=[{v:"credit_card",l:"Credit Card",i:"💳",c:"#E8453C"},{v:"debit",l:"Debit",i:"🏦",c:"#2196F3"},{v:"cash",l:"Cash",i:"💵",c:"#4CAF50"},{v:"loan",l:"Loan / Mortgage",i:"🏠",c:"#FF9800"},{v:"investment",l:"Investment",i:"📈",c:"#7E57C2"},{v:"tax",l:"Tax Owed",i:"🏛",c:"#78909C"}];
const DGRP=[
{id:"g_essentials",name:"Essentials",icon:"🏠",color:"#5C6BC0",subs:[
  {id:"housing",name:"Housing"},{id:"utilities",name:"Utilities"},{id:"insurance",name:"Insurance"},{id:"health",name:"Health"}]},
{id:"g_daily",name:"Daily Living",icon:"🍜",color:"#EF5350",subs:[
  {id:"food",name:"Food & Dining"},{id:"transport",name:"Transport"},{id:"personal",name:"Personal Care"}]},
{id:"g_lifestyle",name:"Lifestyle",icon:"🎬",color:"#FFA726",subs:[
  {id:"shopping",name:"Shopping"},{id:"entertainment",name:"Entertainment"},{id:"travel",name:"Travel"},{id:"education",name:"Education"}]},
{id:"g_family",name:"Family",icon:"👨‍👩‍👧",color:"#EC407A",subs:[
  {id:"childcare",name:"Childcare"},{id:"school_fees",name:"School Fees"},{id:"family_gifts",name:"Family Gifts"},{id:"family_other",name:"Family Other"}]},
{id:"g_giving",name:"Giving",icon:"🎁",color:"#FF7043",subs:[
  {id:"gifts",name:"Gifts"},{id:"donations",name:"Donations"}]},
{id:"g_finance",name:"Finance",icon:"💰",color:"#541346",subs:[
  {id:"debt_payment",name:"Debt Payment"},{id:"subscriptions",name:"Subscriptions"},{id:"transfer",name:"Transfer"}]},
{id:"g_other",name:"Other",icon:"📌",color:"#90A4AE",subs:[
  {id:"other",name:"Other"}]}
];
/* Flatten for lookups — gC will resolve group+sub */
const flatCats=(groups)=>{const out=[];groups.forEach(g=>g.subs.forEach(s=>out.push({id:s.id,name:s.name,groupId:g.id,groupName:g.name,icon:g.icon,color:g.color})));return out};
/* Build grouped options for <select> */
const catSelOpts=(groups)=>{const o=[];groups.forEach(g=>{o.push({value:"__grp_"+g.id,label:"── "+g.icon+" "+g.name+" ──",disabled:true});g.subs.forEach(s=>o.push({value:s.id,label:"    "+s.name}))});return o};
/* CSV export */
const dlCSV=(filename,rows)=>{const esc=v=>{const s=String(v??"");return s.includes(",")||s.includes('"')||s.includes("\n")?'"'+s.replace(/"/g,'""')+'"':s};
  const csv=rows.map(r=>r.map(esc).join(",")).join("\n");const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename;a.click();URL.revokeObjectURL(a.href)};
const exportTxns=(txns,groups,accounts)=>{const fc=flatCats(groups);const hdr=["Date","Type","Amount","Currency","Amount SGD","Category Group","Category","Account","Note","Fulfillment","Life Energy Hrs"];
  const rows=[hdr,...txns.map(t=>{const c=fc.find(x=>x.id===t.categoryId)||{};const a=accounts.find(x=>x.id===t.accountId);
    return[t.date,t.type,t.amount,t.currency,toS(t.amount,t.currency).toFixed(2),c.groupName||"",c.name||"",a?.name||"",t.note||"",t.fulfillment||"",t.lifeEnergyHrs||""]})];
  dlCSV("ymoyl-transactions-"+today()+".csv",rows)};
const exportAccounts=(accounts)=>{const hdr=["Name","Type","Currency","Balance","Credit Limit","APR","Stmt Day","Due Day","Monthly Payment"];
  const rows=[hdr,...accounts.map(a=>[a.name,a.type,a.currency,a.initialBalance,a.creditLimit||"",a.apr||"",a.stmtDay||"",a.dueDay||"",a.monthlyPayment||""])];
  dlCSV("ymoyl-accounts-"+today()+".csv",rows)};
const exportAll=(state)=>{dlCSV("ymoyl-full-backup-"+today()+".csv",[["YMOYL Full Data Backup"],[JSON.stringify(state)]])};

/* ═══ HELPERS ═══ */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const toS=(a,c)=>(parseFloat(a)||0)*(FX[c]||1);
const fm=(a,c="SGD")=>{a=parseFloat(a)||0;return(CUR[c]||"")+Math.abs(a).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})};
const fs=(iso)=>{const d=new Date(iso);return d.getDate()+" "+MO[d.getMonth()]};
const today=()=>new Date().toISOString().slice(0,10);
const tMonth=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")};
const calcMin=(b,apr)=>{b=parseFloat(b)||0;apr=parseFloat(apr)||0;return Math.max(b*.03,25,b*(apr/100/12))};
const calcPay=(b,apr,mp)=>{b=parseFloat(b)||0;apr=parseFloat(apr)||0;mp=parseFloat(mp)||0;if(mp<=0||b<=0)return{m:0,ti:0};let bal=b,mo=0,ti=0,mr=apr/100/12;while(bal>.01&&mo<600){const i=bal*mr;ti+=i;bal=bal+i-mp;mo++;if(bal<0)bal=0}return{m:mo,ti}};

/* ═══ STORAGE ═══ */
const LS={get(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}},set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}};

const DEF={accounts:[],catGroups:DGRP,transactions:[],recurringRules:[],debtPayments:{},
  settings:{monthlySalary:0,weeklyWorkHours:40,weeklyCommuteHours:5,weeklyPrepHours:3,monthlyWorkCosts:0,monthlyInvestmentIncome:0,paydayDate:27,availableCashOverride:null},
  monthlyIncome:{}};

/* ═══ TINY COMPONENTS ═══ */
function PBar({value,max,color="#1B5E3B",h=8}){
  return e("div",{className:"pbar",style:{height:h,background:"#f0f2f5"}},e("div",{className:"pbar-f",style:{width:Math.min((value/Math.max(max,1))*100,100)+"%",height:"100%",background:color}}))
}
function Dots({value,onChange,sz=24}){
  return e("div",{style:{display:"flex",gap:5,alignItems:"center"}},
    [1,2,3,4,5].map(i=>e("button",{key:i,onClick:()=>onChange(i),style:{width:sz,height:sz,borderRadius:"50%",border:"2px solid "+FC[i],background:value>=i?FC[i]:"#fff",cursor:"pointer",transition:"all .15s",display:"flex",alignItems:"center",justifyContent:"center",fontSize:sz*.42,color:value>=i?"#fff":FC[i],fontWeight:800}},i)),
    value>0&&e("span",{style:{fontSize:11,color:"#888",marginLeft:4,fontWeight:600}},FL[value]))
}
function Inp({label,...p}){return e("div",{style:{display:"flex",flexDirection:"column",gap:4}},label&&e("div",{className:"lbl"},label),e("input",{className:"inp",...p}))}
function Sel({label,options,...p}){return e("div",{style:{display:"flex",flexDirection:"column",gap:4}},label&&e("div",{className:"lbl"},label),e("select",{className:"sel",...p},options.map(o=>e("option",{key:o.value??o,value:o.value??o,disabled:!!o.disabled,style:o.disabled?{fontWeight:700,color:"#555",background:"#f0f2f5"}:{}},o.label??o))))}
function Sheet({open,onClose,title,children}){if(!open)return null;return e("div",null,e("div",{className:"overlay",onClick:onClose}),e("div",{className:"sheet"},e("div",{className:"sheet-h"}),title&&e("div",{className:"sheet-t"},title),e("div",{className:"sheet-b"},children)))}

/* ═══════════════════════════ MAIN APP ═══════════════════════════ */
function App(){
  const[S,setS]=us(DEF);
  const[tab,sTab]=us("home");
  const[loading,sLoading]=us(true);
  const[sheet,sSheet]=us(null);
  const[toast,sToast]=us("");
  const[vm,sVM]=us(tMonth());
  const[selAcc,sSelAcc]=us(null);
  const[dCur,sDCur]=us("SGD");
  const[customPay,sCustomPay]=us({});/* {accountId: "amount string"} */

  const flash=m=>{sToast(m);setTimeout(()=>sToast(""),2200)};
  const upd=uc(fn=>{setS(p=>{const n=fn(p);LS.set("ymoyl-v3",n);return n})},[]);
  const sup=(k,v)=>sSheet(p=>({...p,d:{...p.d,[k]:v}}));

  ue(()=>{const d=LS.get("ymoyl-v3");if(d){
    /* Migrate old flat categories to catGroups if needed */
    if(d.categories&&!d.catGroups){d.catGroups=DGRP;delete d.categories}
    if(!d.catGroups||!d.catGroups.length)d.catGroups=DGRP;
    setS(p=>({...p,...d}))}sLoading(false)},[]);

  /* Recurring processor */
  ue(()=>{if(loading)return;const td=today(),d=new Date(td);let nw=[];
    S.recurringRules.forEach(r=>{if(!r.active)return;if(S.transactions.find(t=>t.recurringId===r.id&&t.date===td))return;if(d.getDate()!==r.dayOfMonth)return;
      if(r.type==="auto")nw.push({id:uid(),amount:r.amount,currency:r.currency,categoryId:r.categoryId,accountId:r.accountId,note:r.name+" (auto)",fulfillment:r.fulfillment||3,date:td,recurringId:r.id,type:"expense"})});
    if(nw.length)upd(s=>({...s,transactions:[...nw,...s.transactions]}))
  },[loading]);

  /* ═══ DERIVED ═══ */
  /* Monthly income = sum of all income transactions for that month */
  const mTx=um(()=>S.transactions.filter(t=>t.date?.slice(0,7)===vm),[S.transactions,vm]);
  const mExp=um(()=>mTx.filter(t=>t.type==="expense").reduce((s,t)=>s+toS(t.amount,t.currency),0),[mTx]);
  const mInc=um(()=>mTx.filter(t=>t.type==="income").reduce((s,t)=>s+toS(t.amount,t.currency),0),[mTx]);

  /* Life energy rate: rolling 3-month avg of actual income transactions ÷ total work hours.
     Falls back to settings.monthlySalary if no income logged yet. */
  const ler=um(()=>{
    const s=S.settings;const h=((s.weeklyWorkHours||0)+(s.weeklyCommuteHours||0)+(s.weeklyPrepHours||0))*4.33;
    if(h<=0)return 0;
    const now=new Date();const months=[];
    for(let i=0;i<3;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"))}
    const incomes=months.map(ym=>S.transactions.filter(t=>t.type==="income"&&t.date?.slice(0,7)===ym).reduce((s,t)=>s+toS(t.amount,t.currency),0));
    const nonZero=incomes.filter(v=>v>0);
    const avgInc=nonZero.length>0?nonZero.reduce((a,b)=>a+b,0)/nonZero.length:(s.monthlySalary||0);
    const realPay=avgInc-(s.monthlyWorkCosts||0);
    return realPay>0?realPay/h:0
  },[S.settings,S.transactions]);

  const sr=mInc>0?((mInc-mExp)/mInc*100):0;
  const gA=id=>S.accounts.find(a=>a.id===id);
  const fc=um(()=>flatCats(S.catGroups||DGRP),[S.catGroups]);
  const gC=id=>fc.find(c=>c.id===id)||{name:"Other",icon:"📌",color:"#90A4AE",groupName:"Other"};

  const aBal=uc(acc=>{if(!acc)return 0;
    /* For multi-currency accounts, sum all initial balances converted to SGD */
    let ibSGD=0;
    if(acc.multiCurrency&&acc.balances&&Object.keys(acc.balances).length>0){
      Object.entries(acc.balances).forEach(([c,v])=>{ibSGD+=toS(parseFloat(v)||0,c)});
    }else{ibSGD=toS(parseFloat(acc.initialBalance)||0,acc.currency||"SGD")}
    const tx=S.transactions.filter(t=>t.accountId===acc.id);
    if(acc.type==="credit_card"||acc.type==="loan"||acc.type==="tax"){
      return ibSGD-tx.reduce((s,t)=>{if(t.type==="payment"||t.type==="debt_payment")return s+toS(t.amount,t.currency);if(t.type==="expense")return s-toS(t.amount,t.currency);return s},0)}
    return ibSGD+tx.reduce((s,t)=>{if(t.type==="income")return s+toS(t.amount,t.currency);if(t.type==="expense")return s-toS(t.amount,t.currency);if(t.type==="transfer_in")return s+toS(t.amount,t.currency);if(t.type==="transfer_out"||t.type==="payment"||t.type==="debt_payment")return s-toS(t.amount,t.currency);return s},0)},[S.transactions]);

  /* Multi-currency balance breakdown per account */
  const aBalByCur=uc(acc=>{if(!acc)return{};const tx=S.transactions.filter(t=>t.accountId===acc.id);
    const m={};
    /* Initial balances */
    if(acc.multiCurrency&&acc.balances&&Object.keys(acc.balances).length>0){
      Object.entries(acc.balances).forEach(([c,v])=>{m[c]=(m[c]||0)+(parseFloat(v)||0)});
    }else{const pc=acc.currency||"SGD";m[pc]=(m[pc]||0)+(parseFloat(acc.initialBalance)||0)}
    /* Apply transactions */
    tx.forEach(t=>{const c=t.currency||"SGD";const a=parseFloat(t.amount)||0;
      if(acc.type==="credit_card"||acc.type==="loan"||acc.type==="tax"){
        if(t.type==="payment"||t.type==="debt_payment")m[c]=(m[c]||0)-a;
        else if(t.type==="expense")m[c]=(m[c]||0)+a;
      }else{
        if(t.type==="income")m[c]=(m[c]||0)+a;
        else if(t.type==="expense")m[c]=(m[c]||0)-a;
        else if(t.type==="transfer_in")m[c]=(m[c]||0)+a;
        else if(t.type==="transfer_out"||t.type==="payment"||t.type==="debt_payment")m[c]=(m[c]||0)-a;
      }});
    return m},[S.transactions]);

  const pending=um(()=>{const td=today(),d=new Date(td);
    return S.recurringRules.filter(r=>r.active&&r.type==="manual"&&r.dayOfMonth===d.getDate()&&!S.transactions.find(t=>t.recurringId===r.id&&t.date===td))},[S.recurringRules,S.transactions]);

  const catBD=um(()=>{const m={};mTx.filter(t=>t.type==="expense").forEach(t=>{const c=t.categoryId||"other";if(!m[c])m[c]={t:0,n:0,f:0};m[c].t+=toS(t.amount,t.currency);m[c].n++;m[c].f+=t.fulfillment||0});
    return Object.entries(m).map(([id,d])=>{const c=gC(id);return{...c,id,total:d.t,count:d.n,af:d.n?d.f/d.n:0}}).sort((a,b)=>b.total-a.total)},[mTx,fc]);

  const wallD=um(()=>{const n=new Date();return Array.from({length:12},(_,i)=>{const d=new Date(n.getFullYear(),n.getMonth()-11+i,1);const ym=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");const tx=S.transactions.filter(t=>t.date?.slice(0,7)===ym);
    return{ym,label:MO[d.getMonth()],exp:tx.filter(t=>t.type==="expense").reduce((s,t)=>s+toS(t.amount,t.currency),0),inc:tx.filter(t=>t.type==="income").reduce((s,t)=>s+toS(t.amount,t.currency),0)}})},[S.transactions]);

  const avgExp=um(()=>{const d=wallD.filter(m=>m.exp>0);return d.length?d.reduce((s,m)=>s+m.exp,0)/d.length:0},[wallD]);
  const fiP=avgExp>0?Math.min(((S.settings.monthlyInvestmentIncome||0)/avgExp)*100,100):0;
  const shiftM=dir=>{const[y,m]=vm.split("-").map(Number);const d=new Date(y,m-1+dir,1);sVM(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"))};

  /* ═══ DEBT DERIVED ═══ */
  const debtAccs=um(()=>S.accounts.filter(a=>a.type==="credit_card"||a.type==="loan"||a.type==="tax"),[S.accounts]);
  const ccAccs=um(()=>S.accounts.filter(a=>a.type==="credit_card"),[S.accounts]);
  const loanAccs=um(()=>S.accounts.filter(a=>a.type==="loan"),[S.accounts]);
  const taxAccs=um(()=>S.accounts.filter(a=>a.type==="tax"),[S.accounts]);

  const totalDebt=um(()=>debtAccs.reduce((s,a)=>s+Math.max(aBal(a),0),0),[debtAccs,aBal]);
  const ccDebt=um(()=>ccAccs.reduce((s,a)=>s+Math.max(aBal(a),0),0),[ccAccs,aBal]);
